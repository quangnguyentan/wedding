<!-- ============================================
     ENVELOPE ANIMATION SECTION
     Copy this section into your index.html
     Place it at the top (before main content) or as "Save the Date" section
     ============================================ -->
<section id="envelope-section" class="envelope-section">
    <div class="envelope-container">
        <!-- Flowers -->
        <img src="./assets/flower-left.avif" alt="Flower Left" class="envelope-flower flower-left">
        <img src="./assets/flower-right.avif" alt="Flower Right" class="envelope-flower flower-right">
        
        <!-- Envelope Wrapper -->
        <div class="envelope-wrapper" id="envelopeWrapper">
            <!-- Seal -->
            <div class="envelope-seal" id="envelopeSeal">
                <img src="./assets/seal.avif" alt="Seal">
            </div>
            
            <!-- Envelope Close (Initial State) -->
            <div class="envelope-close" id="envelopeClose">
                <img src="./assets/envelope-close.avif" alt="Envelope Closed">
            </div>
            
            <!-- Envelope Flap (Opens Up) -->
            <div class="envelope-flap" id="envelopeFlap">
                <img src="./assets/envelope-flap.avif" alt="Envelope Flap">
            </div>
            
            <!-- Envelope Open (Final State) -->
            <div class="envelope-open" id="envelopeOpen">
                <img src="./assets/envelope-open.avif" alt="Envelope Opened">
            </div>
            
            <!-- Content Inside (Wedding Photos) -->
            <div class="envelope-content" id="envelopeContent">
                <div class="envelope-photos">
                    <img src="images/1(1).jpg" alt="Wedding Photo 1" class="envelope-photo">
                    <img src="images/1(2).jpg" alt="Wedding Photo 2" class="envelope-photo">
                    <img src="images/1(3).jpg" alt="Wedding Photo 3" class="envelope-photo">
                </div>
                <div class="envelope-text">
                    <h2>Save The Date</h2>
                    <p class="wedding-date">30 • 11 • 2025</p>
                    <p class="couple-names">Văn Công & Nguyễn Thơ</p>
                </div>
            </div>
            
            <!-- Click Instruction -->
            <div class="envelope-instruction" id="envelopeInstruction">
                <p>✨ Nhấn để mở thiệp ✨</p>
            </div>
        </div>
    </div>
</section>
