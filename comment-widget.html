<!-- ============================================
     FLOATING COMMENT SYSTEM
     Copy this code into your index.html
     Place it before the closing </body> tag
     ============================================ -->
<div class="floating-comments" id="floatingComments">
    <div class="floating-comments-header">
        <div class="floating-comments-title">
            <span class="heart-icon">💕</span>
            <span>Lời Chúc</span>
        </div>
        <div class="floating-comments-count">
            <span id="commentCount">8</span> lời chúc
        </div>
    </div>
    
    <div class="floating-comments-body">
        <div class="comment-stream" id="commentStream">
            <!-- Comments will be displayed here dynamically -->
        </div>
    </div>
    
    <div class="floating-hearts" id="floatingHearts">
        <!-- Animated hearts will appear here -->
    </div>
</div>
